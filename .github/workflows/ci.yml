name: ci

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: python -m pip install -r backend/requirements.txt
      - name: Run required backend unit tests
        run: pytest -q backend/tests/test_auth_enforcement_unit.py

      - name: Run backend integration tests (optional)
        if: ${{ secrets.EXPO_PUBLIC_BACKEND_URL != '' }}
        env:
          EXPO_PUBLIC_BACKEND_URL: ${{ secrets.EXPO_PUBLIC_BACKEND_URL }}
        run: pytest -q backend/tests/test_backend_apis.py

      - name: Skip backend integration tests (no backend URL configured)
        if: ${{ secrets.EXPO_PUBLIC_BACKEND_URL == '' }}
        run: echo "Skipping backend integration tests because EXPO_PUBLIC_BACKEND_URL is not set."

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock
      - name: Install deps
        working-directory: frontend
        run: yarn install --frozen-lockfile
      - name: Lint
        working-directory: frontend
        run: yarn lint

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/diana-web/package-lock.json
      - name: Install deps
        working-directory: apps/diana-web
        run: npm ci
      - name: Build
        working-directory: apps/diana-web
        run: npm run build
